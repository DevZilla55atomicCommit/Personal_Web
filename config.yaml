# Site Configuration
siteTitle: "Dev Portfolio"
siteDescription: "A modern portfolio showcasing projects and writing"
author: "DevZilla55"
authorEmail: "devzilla@example.com"
authorAvatar: "/assets/avatar.jpg"

# SEO
social:
  github: "https://github.com/devzilla55"
  twitter: "https://twitter.com/devzilla55"
  linkedin: "https://linkedin.com/in/devzilla55"
  website: "https://example.com"

# Theme
theme:
  darkMode: "system"
  primaryColor: "primary"
  accentColor: "accent"

# Navigation (derived from content structure)
navigation:
  - label: "Home"
    href: "/"
  - label: "Projects"
    href: "/projects/"
  - label: "Writing"
    href: "/writing/"
  - label: "About"
    href: "/about/"
  - label: "Contact"
    href: "/contact/"

# Featured Projects (auto-populated from content)
featuredProjects:
  limit: 3
  sortBy: "date"
  sortOrder: "desc"

# Blog settings
blog:
  excerptLength: 160
  readingTime: true
  authorName: true
  authorAvatar: true

# Performance
performance:
  minify: true
  compressHTML: true
  cacheStatic: true
